<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TECT — Papers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .papers-landing-card {
      border: 1px solid #ddd;
      padding: 1.2em;
      border-radius: 6px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 0.6em;
    }
    .papers-landing-card h3 {
      margin: 0;
      font-size: 1.1em;
      color: #222;
    }
    .papers-landing-card p {
      margin: 0;
      color: #666;
      font-size: 0.9em;
      line-height: 1.5;
    }
    .papers-landing-card a {
      align-self: flex-start;
      padding: 0.5em 1em;
      background: #2266aa;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .papers-landing-card a:hover {
      background: #1a4d88;
    }
    .papers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 1.2em;
    }
    .landing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1em;
    }
    .paper-card {
      border: 1px solid #ddd;
      padding: 1.2em;
      border-radius: 6px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 0.8em;
      transition: box-shadow 0.2s;
    }
    .paper-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .paper-card-head {
      display: flex;
      align-items: center;
      gap: 0.8em;
    }
    .tier-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.8em;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.8em;
      font-family: ui-monospace,Menlo,Consolas,monospace;
    }
    .tier-T7  { background: #1f8b4c; color: white; }
    .tier-T6  { background: #2c7a3e; color: white; }
    .tier-T5  { background: #4a6fa5; color: white; }
    .tier-T4  { background: #b88112; color: white; }
    .tier-T3  { background: #c97a2a; color: white; }
    .tier-T2  { background: #b04a4a; color: white; }
    .tier-T1  { background: #888;    color: white; }
    .tier-T0  { background: #6b1313; color: white; }
    .tier-q   { background: #ccc;    color: #555; }
    .paper-card .stem {
      font-family: ui-monospace,Menlo,Consolas,monospace;
      color: #2266aa;
      font-weight: 600;
      font-size: 0.95em;
    }
    .paper-card-title {
      color: #222;
      font-size: 0.95em;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .paper-card-asof {
      font-size: 0.78em;
      color: #888;
      margin: 0.3em 0 0.2em 0;
      padding: 0.15em 0.4em;
      background: #f4f4f7;
      border-left: 3px solid #6b8caf;
      display: inline-block;
      border-radius: 2px;
    }
    .paper-card-description {
      color: #555;
      font-size: 0.88em;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 0.4em 0;
    }
    .paper-card-math-notes {
      display: flex;
      flex-direction: column;
      gap: 0.4em;
      padding: 0.6em 0.8em;
      background: #f0f4f8;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .math-notes-label {
      font-weight: 600;
      color: #2266aa;
    }
    .math-notes-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4em;
    }
    .math-note-tag {
      display: inline-block;
      padding: 0.25em 0.5em;
      background: #e8f0fa;
      border: 1px solid #2266aa;
      border-radius: 3px;
      color: #2266aa;
      text-decoration: none;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    .math-note-tag:hover {
      background: #2266aa;
      color: white;
    }
    .math-notes-more {
      display: inline-block;
      padding: 0.25em 0.5em;
      color: #666;
      font-size: 0.85em;
      font-style: italic;
    }
    .paper-card-buttons {
      display: flex;
      gap: 0.6em;
      margin-top: 0.4em;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      padding: 0.5em 0.8em;
      border: 1px solid #2266aa;
      border-radius: 4px;
      color: #2266aa;
      text-decoration: none;
      font-size: 0.85em;
      font-weight: 500;
      transition: all 0.2s;
      flex: 1;
      justify-content: center;
    }
    .btn:hover {
      background: #2266aa;
      color: white;
    }
    .btn-download {
      flex-direction: column;
      align-items: center;
    }
    .file-size {
      font-size: 0.8em;
      opacity: 0.9;
    }
    .pdf-cat {
      margin-bottom: 1.5em;
    }
    .pdf-cat h3 {
      margin: 0 0 0.3em 0;
      font-size: 1.2em;
      color: #222;
    }
    .pdf-cat-sub {
      margin: 0 0 1em 0;
      color: #666;
      font-size: 0.95em;
    }
    .pdf-summary {
      margin: 0 0 1.5em 0;
      color: #666;
      font-size: 0.95em;
    }
  </style>
  <script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};</script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header class="site" id="site-header"></header>
<main class="wrap" id="page-content"></main>
<footer class="site" id="site-footer"></footer>
<script src="data/site.js"></script>
<script src="data/papers-auxiliary.js"></script>
<script src="data/papers_pdf_index.js"></script>
<script src="assets/js/papers-render.js"></script>
<script src="assets/js/tect-render.js"></script>
<script src="assets/js/tect-nav.js"></script>
<script>
  TECT.render('papers-auxiliary', window.TECT_PAPERS_AUXILIARY);
  if (document.getElementById('papers-container')) {
    var allPapers = [];
    if (window.TECT_PAPERS_PDF_INDEX && window.TECT_PAPERS_PDF_INDEX.categories) {
      window.TECT_PAPERS_PDF_INDEX.categories.forEach(function (cat) {
        allPapers = allPapers.concat(cat.papers || []);
      });
    }
    TECT.renderPaperGrid('papers-container', allPapers, 'auxiliary');
  }
</script>
</body>
</html>
