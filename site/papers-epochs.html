<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TECT — Papers (Epochs)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .pdf-cat       { margin: 1.4em 0 2em 0; }
    .pdf-cat h3    { border-bottom: 1px solid #ccc; padding-bottom: 0.2em; margin-bottom: 0.4em; }
    .pdf-cat-sub   { color: #666; font-size: 0.92em; margin-bottom: 1em; }
    .pdf-grid      { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
                     gap: 0.9em; }
    .pdf-card      { border: 1px solid #ddd; padding: 0.8em 1.0em; border-radius: 6px;
                     background: #fafafa; display: flex; flex-direction: column;
                     gap: 0.45em; }
    .pdf-card-head { display: flex; align-items: center; gap: 0.6em; }
    .tier-badge    { display: inline-flex; align-items: center; justify-content: center;
                     min-width: 2.6em; padding: 0.15em 0.55em; border-radius: 4px;
                     font-weight: 700; font-size: 0.85em; font-family:
                     ui-monospace,Menlo,Consolas,monospace; }
    .tier-T7  { background: #1f8b4c; color: white; }
    .tier-T6  { background: #2c7a3e; color: white; }
    .tier-T5  { background: #4a6fa5; color: white; }
    .tier-T4  { background: #b88112; color: white; }
    .tier-T3  { background: #c97a2a; color: white; }
    .tier-T2  { background: #b04a4a; color: white; }
    .tier-T1  { background: #888;    color: white; }
    .tier-T0  { background: #6b1313; color: white; }
    .tier-q   { background: #ccc;    color: #555; }
    .pdf-card .stem { font-family: ui-monospace,Menlo,Consolas,monospace;
                      color: #2266aa; font-weight: 600; font-size: 0.98em; }
    .pdf-card .ttl  { color: #222; font-size: 0.92em; line-height: 1.4;
                      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
                      overflow: hidden; }
    .pdf-card-foot  { display: flex; justify-content: space-between; align-items: center;
                      margin-top: 0.3em; }
    .pdf-card .meta { font-size: 0.82em; color: #888; }
    .pdf-card a.dl  { display: inline-block; padding: 0.3em 0.85em;
                      border: 1px solid #2266aa; color: #2266aa;
                      text-decoration: none; border-radius: 4px; font-size: 0.85em; }
    .pdf-card a.dl:hover { background: #2266aa; color: white; }
    .pdf-summary    { font-size: 0.95em; color: #444; margin: 0.6em 0 1.4em 0; }
  </style>
  <script>window.MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]]}};</script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header class="site" id="site-header"></header>
<main class="wrap" id="page-content"></main>
<footer class="site" id="site-footer"></footer>
<script src="data/site.js"></script>
<script src="data/papers_pdf_index.js"></script>
<script src="assets/js/papers-render.js"></script>
<script src="assets/js/tect-render.js"></script>
<script src="assets/js/tect-nav.js"></script>
<script>
  TECT.setPageTitle("PAGEEpochs");
  var pageContent = document.getElementById("page-content");
  pageContent.innerHTML = "<div id=\"papers-grid\"></div>";
  TECT.renderPaperGrid("papers-grid", window.TECT_PAPERS_PDF_INDEX, "epochs",
    "DISPLAY_Epochs", "Epoch-track papers documenting intermediate-closure progress.");
  TECT.renderHeader(document.getElementById("site-header"), window.TECT_SITE);
  TECT.renderFooter(document.getElementById("site-footer"), window.TECT_SITE);
</script>
</body>
</html>
