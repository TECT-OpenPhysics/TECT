<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TECT — Papers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .papers-landing-card {
      border: 1px solid #ddd;
      padding: 1.2em;
      border-radius: 6px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 0.6em;
    }
    .papers-landing-card h3 {
      margin: 0;
      font-size: 1.1em;
      color: #222;
    }
    .papers-landing-card p {
      margin: 0;
      color: #666;
      font-size: 0.9em;
      line-height: 1.5;
    }
    .papers-landing-card a {
      align-self: flex-start;
      padding: 0.5em 1em;
      background: #2266aa;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .papers-landing-card a:hover {
      background: #1a4d88;
    }
  </style>
  <script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};</script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header class="site" id="site-header"></header>
<main class="wrap" id="page-content"></main>
<footer class="site" id="site-footer"></footer>
<script src="data/site.js"></script>
<script src="data/papers.js"></script>
<script src="data/papers_pdf_index.js"></script>
<script src="assets/js/papers-render.js"></script>
<script src="assets/js/tect-render.js"></script>
<script src="assets/js/tect-nav.js"></script>
<script>
  TECT.render('papers', window.TECT_PAPERS);
  // After TECT.render, populate the papers-landing container
  TECT.renderPapersLanding('papers-landing', window.TECT_PAPERS_PDF_INDEX);
</script>
</body>
</html>
