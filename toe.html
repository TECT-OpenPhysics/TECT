<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TECT — TOE Qualification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Three-stage Theory of Everything qualification: S1 (eleven pillars), S2 (global closure), S3 (experimental validation).">
  <link rel="stylesheet" href="assets/style.css">
  <script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']]}};</script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<header class="site" id="site-header"></header>
<main class="wrap" id="page-content">
<!-- TECT-AUTO-TOE-OVERLAY -->
<aside id="toe-status-overlay" class="wrap" style="margin-top:1.4em;border-left:4px solid #2266aa;padding:0.8em 1.0em;background:#f6faff;"><strong>Status-derived 11-pillar canonical tiers</strong> (auto-synced from <a href="status.html">Status</a> page)<div id="toe-status-overlay-body"></div></aside>
<script>(function() {
  if (!window.TECT_STATUS_TIERS) return;
  var d = window.TECT_STATUS_TIERS;
  var rows = d.pillars.map(function(p) {
    return "<tr><td>"+p.pillar+"</td>"+
           "<td>"+p.subject+"</td>"+
           "<td><strong>"+p.tier+"</strong></td>"+
           "<td>"+p.conditional_input+"</td></tr>";
  }).join("");
  document.getElementById("toe-status-overlay-body").innerHTML =
    "<table class=\"pillar-tier\" style=\"margin-top:0.4em\">"+
    "<thead><tr><th>#</th><th>Pillar</th><th>Tier</th>"+
    "<th>Conditional inputs (if T6)</th></tr></thead>"+
    "<tbody>"+rows+"</tbody></table>"+
    "<p style=\"font-size:0.85em;color:#666;margin-top:0.5em\">"+
    "Live snapshot of the Status page&apos;s canonical 11-pillar "+
    "scoreboard. Generated <code>"+d.generated+"</code> by "+
    "<code>Codes/tools/sync_toe_from_status.py</code>. "+
    "If this differs from the 6-Stage cards above, the cards "+
    "are stale; trust this overlay.</p>";
})();</script>
</main>
<footer class="site" id="site-footer"></footer>
<script src="data/site.js"></script>
<script src="data/toe.js"></script>
<script src="data/status_pillar_tiers.js"></script>
<script src="assets/js/tect-render.js"></script>
<script src="assets/js/tect-nav.js"></script>
<script>TECT.render('toe', window.TECT_TOE);</script>
</body>
</html>
